# ============================================
# 🐇 RED_BUNNY v2.0.0 - Docker Compose
# ============================================

version: '3.8'

services:
  redbunny:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redbunny
    hostname: redbunny
    restart: unless-stopped
    
    # Network configuration
    network_mode: host
    # Alternative: use bridge network with port mapping
    # ports:
    #   - "8080:8080"
    
    # Capabilities for network operations
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
      - SYS_PTRACE
      - ALL
    
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    
    # Volumes for persistence
    volumes:
      - ./data:/app/.red_bunny
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./whatsapp_session:/app/.red_bunny/whatsapp_session
      - ./phishing_pages:/app/.red_bunny/phishing_pages
      - ./captured_credentials:/app/.red_bunny/captured_credentials
      - ./ssh_keys:/app/.red_bunny/ssh_keys
      - /etc/localtime:/etc/localtime:ro
    
    # Environment variables
    environment:
      - TZ=UTC
      - REDBUNNY_ENV=production
      - PYTHONPATH=/app
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: redbunny-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    profiles:
      - full

  # Optional: PostgreSQL for advanced storage
  postgres:
    image: postgres:15-alpine
    container_name: redbunny-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=redbunny
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-redbunny123}
      - POSTGRES_DB=redbunny
    profiles:
      - full

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: redbunny-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - redbunny
    profiles:
      - full