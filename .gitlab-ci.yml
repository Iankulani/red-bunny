# ============================================
# 🐇 RED_BUNNY v2.0.0 - GitLab CI/CD
# ============================================

stages:
  - build
  - test
  - security
  - deploy

variables:
  DOCKER_IMAGE_NAME: redbunny
  DOCKER_IMAGE_TAG: latest
  PYTHON_VERSION: "3.10"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/pip
    - venv/

# ====================
# BUILD STAGE
# ====================
build:
  stage: build
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends gcc build-essential libpcap-dev
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
  script:
    - source venv/bin/activate
    - pip install -r requirements.txt
    - pip install -e .
    - python -c "import red_bunny; print('✅ Import successful')"
  artifacts:
    paths:
      - venv/
      - .red_bunny/
    expire_in: 1 day
  only:
    - main
    - develop
    - merge_requests

# ====================
# TEST STAGE
# ====================
test:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends gcc build-essential libpcap-dev
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install -e .
  script:
    - source venv/bin/activate
    - python -c "import red_bunny; print('✅ Import successful')"
    - python -m py_compile red_bunny.py
    - echo "✅ All tests passed"
  artifacts:
    paths:
      - venv/
    expire_in: 1 day
  only:
    - main
    - develop
    - merge_requests

# ====================
# SECURITY SCANNING
# ====================
security_scan:
  stage: security
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - apt-get update && apt-get install -y curl
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
    - curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - echo "🔍 Running Trivy vulnerability scan..."
    - trivy fs --severity HIGH,CRITICAL --exit-code 1 --no-progress .
    - echo "✅ Security scan passed"
  only:
    - main
    - develop

# ====================
# DOCKER BUILD
# ====================
docker_build:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "🐳 Building Docker image..."
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
    - echo "📤 Pushing Docker image..."
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main

# ====================
# DEPLOYMENT
# ====================
deploy_production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client sshpass rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    - echo "🚀 Deploying to production server..."
    - ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "
        cd /opt/redbunny &&
        docker pull $CI_REGISTRY_IMAGE:latest &&
        docker-compose down &&
        docker-compose up -d
      "
    - echo "✅ Deployment complete!"
  environment:
    name: production
    url: https://$DEPLOY_HOST
  only:
    - main
  when: manual

# ====================
# CLEANUP
# ====================
cleanup:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "🧹 Cleaning up old Docker images..."
    - docker system prune -f
  only:
    - main
  when: manual